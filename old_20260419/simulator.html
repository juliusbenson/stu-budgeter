<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <script>
    /* Separate file:// origins do not share localStorage; simulator UI lives in index.html#simulator */
    location.replace(new URL('index.html#simulator', document.baseURI).href);
  </script>
  <meta http-equiv="refresh" content="0;url=index.html#simulator" />
</head>
<body>
  <p><a href="index.html#simulator">Open balance simulator</a></p>
</body>
</html>
